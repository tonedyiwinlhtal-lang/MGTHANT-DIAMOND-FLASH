<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGTHANT DIAMOND FLASH</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>⚡ MGTHANT DIAMOND FLASH ⚡</h1>
</header>

<section class="player">

<input id="playerid" placeholder="Player ID">
<input id="serverid" placeholder="Server ID">

</section>

<section class="grid">

<div class="card" onclick="order('86 Diamonds','4800 Ks')">
<img src="https://i.imgur.com/8QfQFqF.png">
<h3>86 Diamonds</h3>
<p>4800 Ks</p>
</div>

<div class="card" onclick="order('172 Diamonds','9700 Ks')">
<img src="https://i.imgur.com/8QfQFqF.png">
<h3>172 Diamonds</h3>
<p>9700 Ks</p>
</div>

<div class="card" onclick="order('257 Diamonds','14000 Ks')">
<img src="https://i.imgur.com/8QfQFqF.png">
<h3>257 Diamonds</h3>
<p>14000 Ks</p>
</div>

<div class="card" onclick="order('706 Diamonds','37500 Ks')">
<img src="https://i.imgur.com/8QfQFqF.png">
<h3>706 Diamonds</h3>
<p>37500 Ks</p>
</div>

<div class="card" onclick="order('1049 Diamonds','56300 Ks')">
<img src="https://i.imgur.com/8QfQFqF.png">
<h3>1049 Diamonds</h3>
<p>56300 Ks</p>
</div>

<div class="card" onclick="order('2195 Diamonds','113650 Ks')">
<img src="https://i.imgur.com/8QfQFqF.png">
<h3>2195 Diamonds</h3>
<p>113650 Ks</p>
</div>

</section>

<div id="popup" class="popup">

<div class="popup-content">

<h2 id="product"></h2>
<p id="price"></p>

<h3>Select Payment</h3>

<button onclick="pay('KBZ Pay')">KBZ Pay</button>
<button onclick="pay('Wave Pay')">Wave Pay</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
